name: Publish

on:
  push:
    tags:
      - "v*"   # triggers on v2.0.0, v2.1.0, etc.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - run: uv sync --dev

      - run: uv run ruff check src/ tests/
      - run: uv run ruff check --select I src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run ty check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --dev

      - run: uv run pytest tests/ -v -m "not hardware"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - run: uv build

      - name: Install wheel in clean environment and verify import
        run: |
          uv venv .test-install
          uv pip install --python .test-install dist/*.whl
          .test-install/bin/python -c "import dv_interfaces; print('import ok')"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
