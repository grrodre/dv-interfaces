name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - run: uv sync --dev

      - run: uv run ruff check src/ tests/
      - run: uv run ruff check --select I src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run ty check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --dev

      - run: uv run pytest tests/ -v -m "not hardware"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - run: uv build

      - name: Install wheel in clean environment and verify import
        run: uv run --with dist/*.whl --no-project python -c "import dv_interfaces; print('import ok')"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
